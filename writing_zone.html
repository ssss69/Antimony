<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Writing Zone - Antimony</title>
  <link rel="stylesheet" href="mode_pages.css?v=20260614-clean-stage" />
</head>
<body class="writing" data-page="writing">
  <main class="page mode-layout">
    <header class="top glass">
      <div>
        <h1>Writing Zone</h1>
        <p>Drafting, editing, school-writing, and story-building tools that stay here.</p>
      </div>
      <a class="back glass" href="assistant_web.html">Back to Antimony</a>
    </header>

    <section class="grid tool-grid">
      <button class="tool glass" data-prompt="plot architect: create a story arc twist and ending"><b>Plot Architect</b><span>Story arcs, twists, endings.</span></button>
      <button class="tool glass" data-prompt="character bible maker: store personality fears goals and powers"><b>Character Bible Maker</b><span>Personality, fears, goals, powers.</span></button>
      <button class="tool glass" data-prompt="dialogue enhancer: make this speech sound natural"><b>Dialogue Enhancer</b><span>Natural character speech.</span></button>
      <button class="tool glass" data-prompt="scene painter: add sensory description"><b>Scene Painter</b><span>Sensory description.</span></button>
      <button class="tool glass" data-prompt="foreshadowing tool: add hidden clues"><b>Foreshadowing Tool</b><span>Hidden clues and payoffs.</span></button>
      <button class="tool glass" data-prompt="pacing checker: find boring or too-fast parts"><b>Pacing Checker</b><span>Finds slow or rushed parts.</span></button>
      <button class="tool glass" data-prompt="emotion intensity slider: make this scene dramatic"><b>Emotion Intensity Slider</b><span>Calm, funny, dark, dramatic.</span></button>
      <button class="tool glass" data-prompt="style mimic tool: write in a chosen vibe without copying authors"><b>Style Vibe Tool</b><span>Vibe without copying authors.</span></button>
      <button class="tool glass" data-prompt="continuity checker: catch contradictions"><b>Continuity Checker</b><span>Catches contradictions.</span></button>
      <button class="tool glass" data-prompt="title name generator: make cool names"><b>Title/Name Generator</b><span>Names for characters, powers, worlds.</span></button>
      <button class="tool glass" data-prompt="notice_writer: write a school notice"><b>notice_writer</b><span>School notice writing.</span></button>
      <button class="tool glass" data-prompt="notice_checker: check notice format"><b>notice_checker</b><span>Checks notice format.</span></button>
      <button class="tool glass" data-prompt="5w1h_extractor: extract who what when where why how"><b>5w1h_extractor</b><span>Who, what, when, where, why, how.</span></button>
      <button class="tool glass" data-prompt="letter_writer: write a formal letter"><b>letter_writer</b><span>Formal letters.</span></button>
      <button class="tool glass" data-prompt="formal_tone_adjuster: make this more formal"><b>formal_tone_adjuster</b><span>Formal tone adjustment.</span></button>
      <button class="tool glass" data-prompt="letter_format_checker: check letter format"><b>letter_format_checker</b><span>Checks letter structure.</span></button>
      <button class="tool glass" data-prompt="graph_analyzer: analyze a graph"><b>graph_analyzer</b><span>Graph description.</span></button>
      <button class="tool glass" data-prompt="analytical_paragraph_writer: write an analytical paragraph"><b>analytical_paragraph_writer</b><span>Analytical paragraphs.</span></button>
      <button class="tool glass" data-prompt="trend_detector: identify trends"><b>trend_detector</b><span>Trends and changes.</span></button>
      <button class="tool glass" data-prompt="grammar_checker: fix grammar"><b>grammar_checker</b><span>Grammar correction.</span></button>
      <button class="tool glass" data-prompt="vocabulary_enhancer: improve vocabulary"><b>vocabulary_enhancer</b><span>Stronger vocabulary.</span></button>
      <button class="tool glass" data-prompt="humanizer: make this sound natural"><b>humanizer</b><span>Natural human wording.</span></button>
      <button class="tool glass" data-prompt="exam_marker: mark this answer"><b>exam_marker</b><span>Marks and improves answers.</span></button>
      <button class="tool glass" data-prompt="word_limit_controller: fit this to 150 words"><b>word_limit_controller</b><span>Controls word count.</span></button>
    </section>

    <section class="mode-chat glass">
      <div class="mode-chat-log" id="modeMessages"></div>
      <form id="modeForm" class="mode-composer">
        <input id="modeInput" autocomplete="off" placeholder="Ask Writing Zone..." />
        <button type="submit">Send</button>
      </form>
    </section>
  </main>
  <script src="mode_pages.js?v=20260614-clean-stage"></script>
</body>
</html>

services:
  - type: web
    name: antimony-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -m py_compile antimony_core.py hosted_server.py
    startCommand: python hosted_server.py
    healthCheckPath: /health
    envVars:
      - key: USE_OLLAMA
        value: "false"
      - key: USE_OPENAI
        value: "false"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
